<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- X mark made of 4 rounded pills with a circle cutout in center -->
  <g fill="#3300FF">
    <!-- Top-left arm -->
    <rect x="30" y="30" width="45" height="100" rx="22" transform="rotate(-45 80 100)"/>
    <!-- Top-right arm -->
    <rect x="125" y="30" width="45" height="100" rx="22" transform="rotate(45 120 100)"/>
    <!-- Bottom-left arm -->
    <rect x="30" y="70" width="45" height="100" rx="22" transform="rotate(45 80 100)"/>
    <!-- Bottom-right arm -->
    <rect x="125" y="70" width="45" height="100" rx="22" transform="rotate(-45 120 100)"/>
  </g>
  <!-- Center circle cutout -->
  <circle cx="100" cy="100" r="18" fill="white"/>
</svg>
